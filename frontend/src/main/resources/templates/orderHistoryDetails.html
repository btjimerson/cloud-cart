<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<div th:replace="~{fragments/head :: head(title='Order History Details')}"></div>

<body>
    <div class="container px-4 py-5">
        <div th:replace="~{fragments/header :: header(includeCart=false)}"></div>

        <main>
            <div class="container">
                <div th:replace="~{fragments/logo :: logo}"></div>

                <div class="row">
                    <div class="col-10">
                        <h2>Order History Details</h2>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">ID:</div>
                    <div class="col-6"><span th:text="${record.id}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Correlation ID:</div>
                    <div class="col-6"><span th:text="${record.correlationId}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Purchase Date:</div>
                    <div class="col-6"><span th:text="${record.formattedPurchaseDate}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Amount:</div>
                    <div class="col-6"><span th:text="${record.purchaseAmount != null ? #numbers.formatCurrency(record.purchaseAmount) : ''}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Number of Items:</div>
                    <div class="col-6"><span th:text="${record.numberOfItems}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Payment Status:</div>
                    <div class="col-6"><span th:text="${record.paymentStatus}"></div>
                </div>
                <div class="row">
                    <div class="col-6 themed-grid-col">Order Status:</div>
                    <div class="col-6"><span th:text="${record.orderStatus}"></div>
                </div>
                <hr class="mb-4" />
                <div class="row">
                    <div class="col-10">
                        <a class="btn btn-primary" role="button" href="/order-history">Back to Order History</a>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="~{fragments/footer :: footer}"></div>
        <script src="/js/jquery-3.5.1.slim.min.js"></script>
        <script src="/js/bootstrap.bundle.min.js"></script>
    </div>
</body>

</html>
