<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<div th:replace="~{fragments/head :: head(title='Order History')}"></div>

<body>
    <div class="container px-4 py-5">
        <div th:replace="~{fragments/header :: header(includeCart=false)}"></div>

        <main>
            <div class="container">
                <div th:replace="~{fragments/logo :: logo}"></div>

                <div class="row">
                    <div class="col-10">
                        <h2>Order History</h2>
                    </div>
                </div>
                <table class="table table-hover table-bordered">
                    <thead class="thead-light">
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Purchase Date</th>
                            <th scope="col">Amount</th>
                            <th scope="col">Items</th>
                            <th scope="col">Payment Status</th>
                            <th scope="col">Order Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record: ${records}">
                            <td><a th:href="@{/order-history/{id}(id=${record.id})}"><span th:text="${record.id}"></span></a>
                            </td>
                            <td th:text="${record.formattedPurchaseDate}"></td>
                            <td th:text="${record.purchaseAmount != null ? #numbers.formatCurrency(record.purchaseAmount) : ''}"></td>
                            <td th:text="${record.numberOfItems}"></td>
                            <td th:text="${record.paymentStatus}"></td>
                            <td th:text="${record.orderStatus}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
        <div th:replace="~{fragments/footer :: footer}"></div>
        <script src="/js/jquery-3.5.1.slim.min.js"></script>
        <script src="/js/bootstrap.bundle.min.js"></script>
    </div>
</body>

</html>
