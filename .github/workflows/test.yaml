name: test
on:
  push:
  pull_request:
env:
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, frontend, orders, payment-history, payments]
      fail-fast: false
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Run ${{ matrix.service }} tests
      run: ./mvnw test -pl ${{ matrix.service }}
